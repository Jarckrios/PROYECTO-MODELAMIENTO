<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Mi Despensa Virtual</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD */
.login-box{
    background:white;
    width:360px;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    text-align:center;
    animation:fadeIn 0.6s ease-in-out;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(-20px);}
    to{opacity:1; transform:translateY(0);}
}

h2{
    margin-bottom:25px;
    color:#2c3e50;
}

/* INPUTS */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
    transition:0.3s;
}

input:focus{
    border-color:#3498db;
    outline:none;
    box-shadow:0 0 5px rgba(52,152,219,0.5);
}

/* BOTON */
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#3498db;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#2980b9;
    transform:scale(1.02);
}

/* LINKS */
a{
    display:block;
    margin-top:15px;
    color:#3498db;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

/* ICONO */
.logo{
    font-size:40px;
    margin-bottom:10px;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">🛒</div>

<h2>Mi Despensa Virtual</h2>

<input type="email" id="email" placeholder="Correo electrónico">

<input type="password" id="pass" placeholder="Contraseña">

<button onclick="login()">Ingresar</button>

<a href="registro.html">¿No tienes cuenta? Regístrate</a>

</div>

<script>

function login(){

let email = document.getElementById("email").value;
let pass = document.getElementById("pass").value;

if(email === "" || pass === ""){
    alert("Completa todos los campos");
    return;
}

if(email === "admin@demo.com"){
    location.href = "admin/dashboard.html";
}else{
    location.href = "front_user/home.html";
}

}

</script>

</body>

</html>
